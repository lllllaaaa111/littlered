services:
  postgres:
    image: postgres:16
    container_name: xhs_agent_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: xhs_agent
    ports:
      - "5432:5432"
    volumes:
      - xhs_agent_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d xhs_agent"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  xhs_agent_pgdata:

