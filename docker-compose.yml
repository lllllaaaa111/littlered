# ============================================================
# 小红书自动运营 Agent — docker-compose（生产环境）
# 服务：app + postgres + redis
# 用法：
#   cp .env.example .env   # 填写配置
#   docker-compose up -d   # 启动
# ============================================================

services:

  # ── 主应用服务 ──────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xhs_agent_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # 配置模板（只读挂载，entrypoint 渲染后生成 config.yaml）
      - ./config/config.template.yaml:/app/config/config.template.yaml:ro
      # 持久化数据（写入宿主机目录）
      - ./storage:/app/storage
      - ./cookies:/app/cookies
      - ./logs:/app/logs
      - chroma_data:/app/chroma_data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    networks:
      - xhs_network

  # ── PostgreSQL 数据库 ────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: xhs_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-xiaohongshu_agent}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"      # 仅供本地调试访问，生产环境可移除
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-xiaohongshu_agent}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - xhs_network

  # ── Redis 缓存 ───────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: xhs_redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"      # 仅供本地调试访问，生产环境可移除
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - xhs_network

# ── 持久化 Volume ────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  chroma_data:
    driver: local

# ── 内部网络 ─────────────────────────────────────────────
networks:
  xhs_network:
    driver: bridge
